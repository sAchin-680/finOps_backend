services:
  - type: web
    name: finops-backend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    plan: free
    region: oregon
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
